name: Bug report
description: Report a reproducible bug in the quant bot.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and config values.
      placeholder: |
        1. Run `cargo run -- ...`
        2. Use config `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste terminal output or attach files from outputs_rust.
      render: shell
  - type: input
    id: version
    attributes:
      label: Commit / branch
      description: Which commit or branch are you using?
