[start]
starting_capital = 1000000
base_currency = "USD"

[strategy]
strategy_plugin = "industry_relative_reversion"
short_window = 3
long_window = 7
vol_window = 5
top_n = 5
min_momentum = -0.05
mean_reversion_window = 3
volume_window = 5
factor_momentum_weight = 0.15
factor_mean_reversion_weight = 0.55
factor_low_vol_weight = 0.10
factor_volume_weight = 0.20
risk_parity_blend = 0.55
max_turnover_ratio = 0.35
portfolio_method = "herc"
hrp_lookback = 20
winsorize_pct = 0.05
layer1_select_ratio = 0.70
industry_neutral_strength = 0.60
regime_vol_window = 8
regime_target_vol = 0.02
regime_floor_scale = 0.35
regime_ceiling_scale = 1.10

[strategy.market_routing.JP]
strategy_plugin = "industry_relative_reversion"
portfolio_method = "herc"

[risk]
max_gross_exposure_ratio = 0.95
max_symbol_weight = 0.50
daily_loss_limit_ratio = 0.50

[risk.currency_max_net_exposure_ratio]
USD = 0.95

[execution]
commission_bps = 1.0
slippage_bps = 2.0
sell_tax_bps = 0.0
min_fee = 1.0

[fx]
live_enabled = false
provider_url = "https://api.frankfurter.app/latest"
timeout_ms = 1500
refresh_interval_days = 1
failure_cooldown_days = 3

[broker]
mode = "sim"
paper_only = true

[ibkr]
enabled = false
gateway_url = "https://127.0.0.1:5000/v1/api"
account_id = ""
dry_run = true
mirror_log = "outputs_rust/ibkr_mirror_orders.jsonl"
lifecycle_log = "outputs_rust/ibkr_lifecycle_events.jsonl"
auto_reconcile = true
auto_cancel_stale = true
allow_remote_paper = false

[markets.JP]
allocation = 1.00
data_file = "data_synth_pit/jp_equities.csv"
lot_size = 1
min_trade_notional = 0
currency = "USD"
fx_to_base = 1.0
industry_file = "data_synth_pit/jp_industries.csv"
commission_bps = 1.0
slippage_bps = 2.0
min_fee = 1.0
